<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIN Decoder Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Car VIN Decoder</h1>
    <div class="search-box">
        <input type="text" id="vinInput" placeholder="Enter 17-character VIN...">
        <button onclick="fetchVinData()">Decode</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('overview')">Overview</button>
        <button class="tab-btn" onclick="showTab('engine')">Engine</button>
        <button class="tab-btn" onclick="showTab('safety')">Safety</button>
        <button class="tab-btn" onclick="showTab('raw')">Raw Data</button>
    </div>

    <div id="resultContent" class="content-area">
        <p>Enter a VIN to see details.</p>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
